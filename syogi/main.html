<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>将棋 検討・メモツール（Undo連動版）</title>
    <style>
        :root {
            --board-color: #edcb6b;
            --cell-size: 50px;
            --label-size: 25px;
        }
        body { font-family: "Hiragino Mincho ProN", "Yu Mincho", serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; padding-bottom: 50px; }
        
        .mode-selector { margin: 15px; padding: 10px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .mode-btn { padding: 8px 15px; cursor: pointer; border: 1px solid #ccc; background: #eee; }
        .mode-btn.active { background: #007bff; color: white; border-color: #0056b3; font-weight: bold; }

        .container { display: flex; flex-direction: row; gap: 20px; align-items: flex-start; }
        
        /* 盤面 */
        .board-wrapper {
            display: grid;
            grid-template-columns: repeat(9, var(--cell-size)) var(--label-size);
            grid-template-rows: var(--label-size) repeat(9, var(--cell-size));
        }
        .label { display: flex; justify-content: center; align-items: center; font-size: 14px; color: #666; }
        .board {
            grid-column: 1 / 10; grid-row: 2 / 11;
            display: grid; grid-template-columns: repeat(9, var(--cell-size)); grid-template-rows: repeat(9, var(--cell-size));
            background-color: var(--board-color); border: 2px solid #333;
        }
        .cell {
            width: var(--cell-size); height: var(--cell-size); border: 0.5px solid #333;
            display: flex; justify-content: center; align-items: center; font-size: 26px; cursor: pointer; user-select: none;
        }

        /* サイドパネル */
        .side-panel { display: flex; flex-direction: column; gap: 10px; width: 220px; }
        .palette { padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 5px; }
        .palette-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; margin-bottom: 5px; }
        .palette-item {
            width: 35px; height: 35px; border: 1px solid #ccc; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 18px; background: var(--board-color);
        }
        .palette-item.active { border: 2px solid #007bff; background: #e7f3ff; }
        .palette-item.gote { transform: rotate(180deg); }
        
        .komadai { background: var(--board-color); border: 1px solid #333; padding: 5px; min-height: 80px; display: flex; flex-wrap: wrap; gap: 3px; cursor: pointer; }
        .komadai-title { font-size: 11px; width: 100%; border-bottom: 1px solid #333; pointer-events: none; }

        /* 棋譜メモ */
        .memo-area { display: flex; flex-direction: column; gap: 5px; }
        textarea { width: 220px; height: 350px; font-family: monospace; font-size: 14px; padding: 10px; resize: none; border: 1px solid #ccc; }

        .piece { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .piece.gote { transform: rotate(180deg); }
        .piece.promoted { color: #d32f2f; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="mode-selector">
    <button id="btn-edit" class="mode-btn active" onclick="setMode('edit')">作成モード</button>
    <button id="btn-play" class="mode-btn" onclick="setMode('play')">検討モード</button>
    <button onclick="undo()" style="margin-left: 20px; padding: 8px 15px; cursor: pointer; background: #fff; border-radius: 4px;">待った (Undo)</button>
</div>

<div class="container">
    <div id="side-left" class="side-panel">
        <div id="panel-edit" class="palette">
            <div style="font-size: 12px; margin-bottom:5px;">駒箱 (右クリックで成)</div>
            <div class="palette-group" id="sente-pieces"></div>
            <div class="palette-group" id="gote-pieces"></div>
            <button onclick="clearBoard()" style="width:100%">全クリア</button>
        </div>
        <div id="panel-play" class="hidden">
            <div id="gote-hand" class="komadai"><div class="komadai-title">後手 持ち駒</div></div>
            <div style="height: 150px;"></div>
            <div id="sente-hand" class="komadai"><div class="komadai-title">先手 持ち駒</div></div>
        </div>
    </div>

    <div class="board-wrapper" id="board-wrapper"></div>

    <div class="side-panel memo-area">
        <div style="font-size: 14px; font-weight: bold;">棋譜メモ</div>
        <textarea id="kifu-memo" placeholder="棋譜が自動記録されます..."></textarea>
        <button onclick="downloadMemo()">メモを保存</button>
    </div>
</div>

<script>
    let mode = 'edit';
    let currentBrush = null; 
    let selectedPiece = null;
    let history = []; 

    const types = ['歩', '香', '桂', '銀', '金', '角', '飛', '玉'];
    const kanjiNums = ['一', '二', '三', '四', '五', '六', '七', '八', '九'];
    const promoMap = { '歩':'と', '香':'杏', '桂':'圭', '銀':'全', '角':'馬', '飛':'龍' };
    const revPromoMap = Object.fromEntries(Object.entries(promoMap).map(([k,v]) => [v,k]));

    function saveHistory() {
        const state = {
            board: document.getElementById('main-board').innerHTML,
            senteHand: document.getElementById('sente-hand').innerHTML,
            goteHand: document.getElementById('gote-hand').innerHTML,
            memo: document.getElementById('kifu-memo').value
        };
        history.push(JSON.stringify(state));
        if (history.length > 100) history.shift(); 
    }

    function undo() {
        if (history.length === 0) return;
        const lastState = JSON.parse(history.pop());
        document.getElementById('main-board').innerHTML = lastState.board;
        document.getElementById('sente-hand').innerHTML = lastState.senteHand;
        document.getElementById('gote-hand').innerHTML = lastState.goteHand;
        document.getElementById('kifu-memo').value = lastState.memo;
        
        rebindEvents();
        selectedPiece = null;
    }

    function rebindEvents() {
        document.querySelectorAll('.cell').forEach(cell => {
            cell.onclick = () => handleCellClick(cell);
            cell.oncontextmenu = (e) => {
                e.preventDefault();
                const piece = cell.querySelector('.piece');
                if (piece) { saveHistory(); togglePromotion(piece); }
            };
        });
        // 持ち駒の再バインド
        [document.getElementById('sente-hand'), document.getElementById('gote-hand')].forEach(hand => {
            hand.onclick = (e) => {
                if (mode !== 'play') return;
                const p = e.target.closest('.piece');
                if (p) selectedPiece = p;
            };
        });
    }

    function setMode(newMode) {
        mode = newMode;
        document.getElementById('btn-edit').classList.toggle('active', mode === 'edit');
        document.getElementById('btn-play').classList.toggle('active', mode === 'play');
        document.getElementById('panel-edit').classList.toggle('hidden', mode === 'play');
        document.getElementById('panel-play').classList.toggle('hidden', mode === 'edit');
        selectedPiece = null;
    }

    function initLayout() {
        const wrapper = document.getElementById('board-wrapper');
        for (let i = 9; i >= 1; i--) {
            const lbl = document.createElement('div'); lbl.className = 'label'; lbl.textContent = i;
            wrapper.appendChild(lbl);
        }
        wrapper.appendChild(document.createElement('div'));

        const board = document.createElement('div');
        board.className = 'board'; board.id = 'main-board';
        wrapper.appendChild(board);

        for (let i = 0; i < 81; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.idx = i;
            board.appendChild(cell);
        }
        rebindEvents();

        for (let i = 0; i < 9; i++) {
            const lbl = document.createElement('div');
            lbl.className = 'label'; lbl.style.gridColumn = '10'; lbl.style.gridRow = (i + 2).toString();
            lbl.textContent = kanjiNums[i];
            wrapper.appendChild(lbl);
        }
    }

    function handleCellClick(cell) {
        const piece = cell.querySelector('.piece');

        if (mode === 'edit') {
            saveHistory();
            if (currentBrush) {
                if (piece) cell.removeChild(piece);
                cell.appendChild(createPiece(currentBrush.type, currentBrush.side));
            } else if (piece) {
                cell.removeChild(piece);
            }
        } else {
            if (selectedPiece) {
                // 移動先が同じ場所ならキャンセル
                if (selectedPiece.parentElement === cell) {
                    selectedPiece = null;
                    return;
                }
                
                saveHistory();
                writeKifu(cell, selectedPiece);

                if (piece && piece !== selectedPiece) {
                    capturePiece(piece);
                }
                cell.appendChild(selectedPiece);
                selectedPiece = null;
            } else if (piece) {
                selectedPiece = piece;
            }
        }
    }

    function writeKifu(toCell, piece) {
        const memo = document.getElementById('kifu-memo');
        const toIdx = parseInt(toCell.dataset.idx);
        const col = 9 - (toIdx % 9);
        const row = kanjiNums[Math.floor(toIdx / 9)];
        const sideMark = piece.dataset.side === 'sente' ? '▲' : '△';
        
        // 持ち駒から打ったかどうかの判定
        const isDrop = piece.parentElement.classList.contains('komadai');
        const action = isDrop ? '打' : '';
        
        const moveStr = `${sideMark}${col}${row}${piece.textContent}${action}`;
        memo.value += moveStr + "\n";
        memo.scrollTop = memo.scrollHeight;
    }

    function capturePiece(piece) {
        if (piece.dataset.promoted === "true") togglePromotion(piece);
        const newSide = piece.dataset.side === 'sente' ? 'gote' : 'sente';
        piece.className = `piece ${newSide}`;
        piece.dataset.side = newSide;
        const targetHand = (newSide === 'sente') ? document.getElementById('sente-hand') : document.getElementById('gote-hand');
        targetHand.appendChild(piece);
    }

    function createPiece(type, side) {
        const div = document.createElement('div');
        div.className = `piece ${side}`;
        div.textContent = type;
        div.dataset.type = type;
        div.dataset.side = side;
        div.dataset.promoted = "false";
        return div;
    }

    function togglePromotion(piece) {
        const type = piece.dataset.type;
        if (piece.dataset.promoted === "true") {
            piece.textContent = revPromoMap[type] || type;
            piece.dataset.type = piece.textContent;
            piece.dataset.promoted = "false";
            piece.classList.remove('promoted');
        } else if (promoMap[type]) {
            piece.textContent = promoMap[type];
            piece.dataset.type = piece.textContent;
            piece.dataset.promoted = "true";
            piece.classList.add('promoted');
        }
    }

    function initPalette() {
        const sBox = document.getElementById('sente-pieces');
        const gBox = document.getElementById('gote-pieces');
        types.forEach(type => {
            sBox.appendChild(createPaletteItem(type, 'sente'));
            gBox.appendChild(createPaletteItem(type, 'gote'));
        });
        
        const eraser = document.createElement('button');
        eraser.textContent = "消しゴム"; eraser.style.width="100%";
        eraser.onclick = () => {
            document.querySelectorAll('.palette-item').forEach(el => el.classList.remove('active'));
            currentBrush = null;
        };
        sBox.parentElement.appendChild(eraser);
    }

    function createPaletteItem(type, side) {
        const div = document.createElement('div');
        div.className = `palette-item ${side}`;
        div.textContent = type;
        div.onclick = () => {
            document.querySelectorAll('.palette-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            currentBrush = { type, side };
        };
        return div;
    }

    function downloadMemo() {
        const text = document.getElementById('kifu-memo').value;
        const blob = new Blob([text], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'shogi_memo.txt';
        a.click();
    }

    function clearBoard() {
        if (confirm("リセットしますか？")) {
            saveHistory();
            document.getElementById('main-board').querySelectorAll('.cell').forEach(c => c.innerHTML = '');
            document.getElementById('sente-hand').innerHTML = '<div class="komadai-title">先手 持ち駒</div>';
            document.getElementById('gote-hand').innerHTML = '<div class="komadai-title">後手 持ち駒</div>';
            document.getElementById('kifu-memo').value = '';
        }
    }

    initLayout();
    initPalette();
</script>

</body>
</html>
